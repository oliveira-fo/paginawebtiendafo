<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FO Tecnología | Catálogo Gamer Paraguay</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --accent: #00e5a0; /* Verde neón para el toque gamer */
            --text: #f0f0f5;
            --wa: #25d366;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            padding-bottom: 50px;
        }

        header {
            padding: 3rem 1rem;
            text-align: center;
            background: linear-gradient(180deg, #16161f 0%, var(--bg) 100%);
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        .search-bar {
            max-width: 500px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        #search {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--surface);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        #search:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 229, 160, 0.2);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: var(--surface);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: contain;
            background: #1a1a24;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .card h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            margin: 10px 0;
        }

        .price {
            font-size: 1.4rem;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 15px;
        }

        .btn-wa {
            background-color: var(--wa);
            color: #000;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-wa:hover {
            filter: brightness(1.1);
        }

        /* Estilo para celulares */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>FO TECNOLOGÍA</h1>
    <p style="color: #888;">Tu proveedor de confianza</p>
    <div class="search-bar">
        <input type="text" id="search" placeholder="Buscar en Compulandia...">
    </div>
</header>

<div class="container" id="grid">
    </div>

<script>
    // 1. CONFIGURACIÓN: Cambia esto por tu número de WhatsApp
    const MI_WHATSAPP = "59598XXXXXXXX"; 

    // 2. DATOS: Aquí es donde vas agregando lo que saques de Compulandia
    const productos = [
        {
            nombre: "Notebook Acer Nitro 5 i5 RTX 3050",
            precio: 5850000,
            imagen: "https://via.placeholder.com/300?text=Acer+Nitro+5",
            categoria: "Notebooks"
        },
        {
            nombre: "Mouse Logitech G305 K/DA",
            precio: 350000,
            imagen: "https://via.placeholder.com/300?text=Mouse+G305",
            categoria: "Periféricos"
        },
        {
            nombre: "Monitor Gamer Curvo 24' 144Hz",
            precio: 1450000,
            imagen: "https://via.placeholder.com/300?text=Monitor+Gamer",
            categoria: "Monitores"
        }
    ];

    // Función para formatear a Gs.
    function formatoGs(num) {
        return new Intl.NumberFormat('es-PY').format(num) + " Gs.";
    }

    function mostrarProductos(filtro = "") {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";

        const filtrados = productos.filter(p => 
            p.nombre.toLowerCase().includes(filtro.toLowerCase())
        );

        filtrados.forEach(p => {
            const mensajeWa = encodeURIComponent(`¡Hola FO Tecnología! Me interesa este producto:\n\n*${p.nombre}*\nPrecio: ${formatoGs(p.precio)}`);
            
            grid.innerHTML += `
                <div class="card">
                    <img src="${p.imagen}" alt="${p.nombre}">
                    <small style="color:var(--accent)">${p.categoria}</small>
                    <h3>${p.nombre}</h3>
                    <div class="price">${formatoGs(p.precio)}</div>
                    <a href="https://wa.me/${MI_WHATSAPP}?text=${mensajeWa}" target="_blank" class="btn-wa">
                        🛒 Comprar ahora
                    </a>
                </div>
            `;
        });
    }

    // Escuchar el buscador
    document.getElementById('search').addEventListener('input', (e) => {
        mostrarProductos(e.target.value);
    });

    // Carga inicial
    mostrarProductos();
</script>

</body>
</html>
