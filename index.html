<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FO Tecnología | Catálogo Gamer</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f; --surface: #111118; --accent: #00e5a0;
            --text: #f0f0f5; --muted: #888898; --wa: #25d366;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif; margin: 0;
        }

        header {
            padding: 2rem; text-align: center;
            background: linear-gradient(to bottom, #16161f, var(--bg));
        }

        h1 { font-family: 'Syne', sans-serif; color: var(--accent); margin-bottom: 0.5rem; }

        .search-container {
            max-width: 600px; margin: 1rem auto; padding: 0 1rem;
        }

        #search-input {
            width: 100%; padding: 12px 20px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--surface); color: white; outline: none;
        }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem; padding: 2rem; max-width: 1200px; margin: 0 auto;
        }

        .card {
            background: var(--surface); border-radius: 15px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .card-img {
            width: 100%; height: 200px; object-fit: cover;
            background: #1a1a24;
        }

        .card-content { padding: 1.5rem; }

        .price { color: var(--accent); font-weight: bold; font-size: 1.2rem; display: block; margin: 0.5rem 0; }

        .btn-wa {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: var(--wa); color: black; text-decoration: none;
            padding: 10px; border-radius: 8px; font-weight: bold; margin-top: 1rem;
        }

        .btn-wa:hover { opacity: 0.9; }
    </style>
</head>
<body>

<header>
    <h1>FO TECNOLOGÍA</h1>
    <p>Catálogo de Componentes e Informática</p>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Buscar notebook, gráfica, periféricos...">
    </div>
</header>

<div class="grid" id="product-grid">
    </div>

<script>
    // Configuración
    const WHATSAPP_NUMBER = "595981123456"; // CAMBIA ESTO POR TU NÚMERO
    
    // Simulación de base de datos (aquí pondrás lo de Compulandia)
    const products = [
        { id: 1, name: "Gforce RTX 4060 Ti", price: 3450000, img: "https://via.placeholder.com/300", cat: "GPU" },
        { id: 2, name: "Notebook Asus ROG Zephyrus", price: 8900000, img: "https://via.placeholder.com/300", cat: "Notebooks" },
        { id: 3, name: "Mouse Logitech G Pro X", price: 750000, img: "https://via.placeholder.com/300", cat: "Periféricos" },
    ];

    function formatPYG(number) {
        return new Intl.NumberFormat('es-PY', { style: 'currency', currency: 'PYG', minimumFractionDigits: 0 }).format(number);
    }

    function render(filter = "") {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = "";
        
        const filtered = products.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));

        filtered.forEach(p => {
            const msg = encodeURIComponent(`Hola FO Tecnología! Me interesa: ${p.name} (${formatPYG(p.price)})`);
            grid.innerHTML += `
                <div class="card">
                    <img src="${p.img}" class="card-img" alt="${p.name}">
                    <div class="card-content">
                        <small style="color:var(--muted)">${p.cat}</small>
                        <h3 style="margin:5px 0">${p.name}</h3>
                        <span class="price">${formatPYG(p.price)}</span>
                        <a href="https://wa.me/${WHATSAPP_NUMBER}?text=${msg}" target="_blank" class="btn-wa">
                            Comprar por WhatsApp
                        </a>
                    </div>
                </div>
            `;
        });
    }

    document.getElementById('search-input').addEventListener('input', (e) => render(e.target.value));
    
    // Carga inicial
    render();
</script>

</body>
</html>
