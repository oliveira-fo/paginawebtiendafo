<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FO Tecnología | Catálogo y Gestión</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f; --surface: #111118; --accent: #00e5a0;
            --text: #f0f0f5; --muted: #888898; --wa: #25d366; --danger: #ff4757;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif; margin: 0; padding-bottom: 50px;
        }

        /* --- Header y Navegación --- */
        header {
            padding: 2rem; text-align: center;
            background: linear-gradient(180deg, #16161f 0%, var(--bg) 100%);
        }

        h1 { font-family: 'Syne', sans-serif; color: var(--accent); letter-spacing: 2px; }

        nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        nav button { 
            background: none; border: 1px solid var(--accent); color: var(--accent);
            padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold;
        }
        nav button:hover { background: var(--accent); color: black; }

        .search-container { max-width: 500px; margin: 0 auto 2rem; padding: 0 1rem; }
        #search-input {
            width: 100%; padding: 12px 20px; border-radius: 30px;
            background: var(--surface); border: 1px solid rgba(255,255,255,0.1); color: white;
        }

        /* --- Catálogo --- */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem; padding: 2rem; max-width: 1200px; margin: 0 auto;
        }

        .card {
            background: var(--surface); border-radius: 20px; padding: 15px;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: contain; border-radius: 10px; background: #1a1a24; }
        .price { font-size: 1.5rem; color: var(--accent); font-weight: bold; margin: 10px 0; }
        .btn-wa {
            display: block; background: var(--wa); color: black; text-align: center;
            padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold;
        }

        /* --- Panel Administrador --- */
        #admin-panel { max-width: 800px; margin: 0 auto; padding: 2rem; display: none; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--muted); }
        input { 
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333;
            background: #1a1a24; color: white; box-sizing: border-box;
        }
        .btn-save { 
            background: var(--accent); color: black; border: none; padding: 12px 20px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;
        }

        .admin-list { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
        .admin-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--surface); padding: 10px; border-radius: 8px; margin-bottom: 10px;
        }
        .btn-delete { background: var(--danger); border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>FO TECNOLOGÍA</h1>
    <nav>
        <button onclick="showSection('catalog')">Ver Catálogo</button>
        <button onclick="showSection('admin')">Panel Admin</button>
    </nav>
</header>

<section id="catalog-section">
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Buscar productos de Compulandia..." oninput="renderCatalog()">
    </div>
    <div class="grid" id="product-grid"></div>
</section>

<section id="admin-panel">
    <h2>Cargar Nuevo Producto</h2>
    <div class="form-group">
        <label>Nombre del Producto</label>
        <input type="text" id="p-name" placeholder="Ej: Memoria RAM 16GB DDR4">
    </div>
    <div class="form-group">
        <label>Precio (en Guaraníes, solo números)</label>
        <input type="number" id="p-price" placeholder="Ej: 350000">
    </div>
    <div class="form-group">
        <label>URL de la Imagen (de Compulandia)</label>
        <input type="text" id="p-img" placeholder="Haz clic derecho en la foto de Compulandia y 'Copiar dirección de imagen'">
    </div>
    <button class="btn-save" onclick="saveProduct()">Guardar Producto</button>

    <div class="admin-list" id="admin-list">
        <h3>Productos actuales</h3>
        </div>
</section>

<script>
    const WHATSAPP_NUM = "59598XXXXXXXX"; // TU NÚMERO AQUÍ
    let products = JSON.parse(localStorage.getItem('fo_products')) || [];

    function showSection(section) {
        document.getElementById('catalog-section').style.display = section === 'catalog' ? 'block' : 'none';
        document.getElementById('admin-panel').style.display = section === 'admin' ? 'block' : 'none';
        if(section === 'admin') renderAdminList();
    }

    function saveProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const img = document.getElementById('p-img').value;

        if(!name || !price || !img) return alert("Completa todos los campos");

        const newProduct = { id: Date.now(), name, price, img };
        products.push(newProduct);
        localStorage.setItem('fo_products', JSON.stringify(products));
        
        // Limpiar campos
        document.getElementById('p-name').value = "";
        document.getElementById('p-price').value = "";
        document.getElementById('p-img').value = "";
        
        alert("¡Producto guardado!");
        renderAdminList();
        renderCatalog();
    }

    function deleteProduct(id) {
        if(confirm("¿Seguro quieres eliminarlo?")) {
            products = products.filter(p => p.id !== id);
            localStorage.setItem('fo_products', JSON.stringify(products));
            renderAdminList();
            renderCatalog();
        }
    }

    function formatGs(num) {
        return new Intl.NumberFormat('es-PY').format(num) + " Gs.";
    }

    function renderCatalog() {
        const grid = document.getElementById('product-grid');
        const search = document.getElementById('search-input').value.toLowerCase();
        grid.innerHTML = "";

        const filtered = products.filter(p => p.name.toLowerCase().includes(search));

        filtered.forEach(p => {
            const msg = encodeURIComponent(`Hola FO Tecnología! Quiero comprar: ${p.name} por ${formatGs(p.price)}`);
            grid.innerHTML += `
                <div class="card">
                    <img src="${p.img}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <div class="price">${formatGs(p.price)}</div>
                    <a href="https://wa.me/${WHATSAPP_NUM}?text=${msg}" target="_blank" class="btn-wa">Comprar por WhatsApp</a>
                </div>
            `;
        });
    }

    function renderAdminList() {
        const list = document.getElementById('admin-list');
        list.innerHTML = "<h3>Productos actuales</h3>";
        products.forEach(p => {
            list.innerHTML += `
                <div class="admin-item">
                    <span>${p.name} - ${formatGs(p.price)}</span>
                    <button class="btn-delete" onclick="deleteProduct(${p.id})">Borrar</button>
                </div>
            `;
        });
    }

    // Inicio
    renderCatalog();
</script>
</body>
</html>
