<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FO Tecnología | High-End Hardware</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030305; --surface: #0a0a0f; --accent: #00ffa3;
            --text: #ffffff; --muted: #94a3b8; --wa: #25d366;
        }

        body {
            background-color: var(--bg);
            /* Fondo Tech: Cuadrícula de precisión neón */
            background-image: 
                linear-gradient(rgba(0, 255, 163, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 163, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0;
            padding-bottom: 50px;
        }

        header {
            padding: 4rem 1rem; text-align: center;
            background: radial-gradient(circle at center, #0e1a14 0%, var(--bg) 80%);
        }

        .logo-img {
            max-width: 280px;
            filter: drop-shadow(0 0 15px rgba(0, 255, 163, 0.3));
            margin-bottom: 1rem;
        }

        header p { color: var(--accent); font-weight: bold; letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; }

        /* Buscador */
        .search-container { max-width: 650px; margin: -35px auto 4rem; padding: 0 1.5rem; }
        #search-input {
            width: 100%; padding: 22px; border-radius: 15px;
            background: var(--surface); border: 1px solid rgba(255,255,255,0.1);
            color: white; font-size: 1.1rem; outline: none; transition: 0.4s;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        #search-input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(0, 255, 163, 0.2); }

        /* Catálogo */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2.5rem; padding: 0 2rem; max-width: 1300px; margin: 0 auto;
        }

        .card {
            background: var(--surface); border-radius: 24px; padding: 25px;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.4s;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-12px); border-color: var(--accent); box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        
        .card img { 
            width: 100%; height: 260px; object-fit: contain; 
            border-radius: 16px; background: #050508; margin-bottom: 20px;
        }

        .card h3 { font-family: 'Syne', sans-serif; font-size: 1.2rem; margin: 0 0 10px; height: 2.5em; overflow: hidden; }
